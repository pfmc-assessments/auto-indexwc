name: Commit results

on:
  workflow_dispatch:  # manual trigger
  schedule:
    - cron: '0 0 3 1,4,7,10 *'  # Runs midnight UTC on the 3rd of Jan, Apr, Jul, Oct
  push:
    paths:
      - .github/workflows/R-commit-results.yml

jobs:
  commit-results:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and extract artifacts from last completed R-run-models run
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFileName = "R-run-models.yml";
            const fs = require('fs');
            const { execSync } = require('child_process');

            // 1. Get workflow ID
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const workflow = workflows.data.workflows.find(wf => wf.path.endsWith(workflowFileName));
            if (!workflow) {
              throw new Error(`Workflow ${workflowFileName} not found.`);
            }

            // 2. Get latest completed run (not just "success") -- some species
            // models may not converge regardless of retries, so we commit
            // whatever batches finished successfully.
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              status: "completed",
              per_page: 1,
            });

            const latestRun = runs.data.workflow_runs[0];
            if (!latestRun) {
              throw new Error(`No completed runs found for ${workflowFileName}`);
            }

            console.log(`Fetching artifacts from run ID ${latestRun.id} (conclusion: ${latestRun.conclusion}) of workflow ${workflowFileName}`);

            // 3. Download artifacts
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: latestRun.id,
              per_page: 100,
            });

            console.log(`Found ${artifacts.data.artifacts.length} artifacts:`);
            artifacts.data.artifacts.forEach(a => console.log(`  - ${a.name}`));

            if (!fs.existsSync('./artifacts')) fs.mkdirSync('./artifacts');

            for (const artifact of artifacts.data.artifacts) {
              const name = artifact.name;
              const destZip = `./artifacts/${name}.zip`;
              const extractDir = `./artifacts/${name}`;

              console.log(`Downloading ${name}`);
              try {
                const download = await github.rest.actions.downloadArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                  archive_format: 'zip',
                });

                fs.writeFileSync(destZip, Buffer.from(download.data));
                fs.mkdirSync(extractDir);
                execSync(`unzip -q ${destZip} -d ${extractDir}`);
                console.log(`Extracted ${name} to ${extractDir}`);
              } catch (err) {
                if (err.status === 410) {
                  console.warn(`Skipping ${name}: artifact has expired`);
                } else {
                  throw err;  // re-throw unexpected errors
                }
              }
            }

      - name: Show extracted artifact contents
        run: |
          echo "Extracted artifact directory structure:"
          find artifacts

      - name: Merge outputs and prepare autogen-results branch
        run: |
          git checkout --orphan autogen-results
          git rm -rf . || true

          mkdir -p output

          for batch_dir in artifacts/*/; do
            # Skip zip files
            [[ "$batch_dir" == *.zip/ ]] && continue
            echo "Processing $batch_dir"

            # The artifact upload strips the "output/" prefix, so species
            # subfolders sit directly under the batch dir. Copy everything
            # across, skipping the zip sidecars.
            if [ -d "$batch_dir" ]; then
              cp -r "$batch_dir." output/
            else
              echo "  No files found in $batch_dir"
            fi
          done

          echo "Final output structure:"
          find output -type f | sort

          git add output
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[bot] update results from artifacts"
            git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git autogen-results
          fi
